<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TT Mixer Elite</title>
    <style>
        :root { 
            --bg: #0f172a; 
            --card: #1e293b; 
            --primary: #3b82f6; 
            --text: #f1f5f9; 
            --accent: #ef4444; 
            --success: #10b981;
            --border: #334155;
        }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; line-height: 1.5; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: var(--card); padding: 16px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3); margin-bottom: 20px; }
        h2 { margin-top: 0; font-size: 1.1rem; color: var(--primary); text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 15px; }
        
        .player-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        input[type="text"] { flex-grow: 1; padding: 10px; background: #0f172a; border: 1px solid var(--border); border-radius: 8px; color: white; font-size: 0.9rem; }
        input[type="checkbox"] { transform: scale(1.3); }
        
        button { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; font-size: 1rem; transition: filter 0.2s; }
        button:active { filter: brightness(0.8); }
        
        /* Split Match View */
        .match-grid { display: grid; grid-template-columns: 1fr 40px 1fr; align-items: start; gap: 10px; margin-bottom: 15px; }
        .team-col { display: flex; flex-direction: column; align-items: center; text-align: center; }
        .player-name { font-weight: 600; font-size: 1rem; margin: 4px 0; }
        .ampersand { color: #64748b; font-size: 0.8rem; }
        .vs-circle { background: var(--accent); width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.7rem; margin-top: 25px; }
        .win-btn { background: var(--success); padding: 10px; font-size: 0.85rem; margin-top: 10px; }

        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { text-align: left; color: #94a3b8; font-weight: 500; padding: 8px; }
        td { padding: 10px 8px; border-top: 1px solid var(--border); }
        .badge { background: #334155; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; color: #94a3b8; }
        .reset-link { color: #64748b; text-align: center; display: block; margin-top: 20px; font-size: 0.8rem; text-decoration: none; cursor: pointer;}
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>1. Players & Availability</h2>
        <div id="playerInputs"></div>
    </div>

    <button onclick="generateNextMatch()">Generate Next Match</button>

    <div id="currentMatchArea" class="card" style="display:none; border: 2px solid var(--primary);">
        <h2>Current Match</h2>
        <div class="match-grid">
            <div class="team-col" id="teamA"></div>
            <div class="vs-circle">VS</div>
            <div class="team-col" id="teamB"></div>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 40px 1fr; gap: 10px;">
            <button class="win-btn" onclick="recordWin('A')">Team A Won</button>
            <div></div>
            <button class="win-btn" onclick="recordWin('B')">Team B Won</button>
        </div>
    </div>

    <div class="card">
        <h2>Leaderboard</h2>
        <table id="leaderboard">
            <thead>
                <tr><th>Player</th><th>P</th><th>W</th><th>W%</th><th>Wilson</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px;">
        <button onclick="resetSession()" style="background: #475569; font-size: 0.8rem; padding: 10px;">Reset Session (L:0)</button>
        <button onclick="resetLeaderboard()" style="background: #475569; font-size: 0.8rem; padding: 10px;">Clear Leaderboard</button>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;">
        <button onclick="exportData()" style="background: #1e293b; border: 1px solid var(--border); font-size: 0.8rem; padding: 10px;">📤 Export Data</button>
        <button onclick="document.getElementById('importFile').click()" style="background: #1e293b; border: 1px solid var(--border); font-size: 0.8rem; padding: 10px;">📥 Import Data</button>
        <input type="file" id="importFile" style="display:none" accept=".json" onchange="importData(event)">
    </div>

    <a href="javascript:void(0)" class="reset-link" onclick="resetData()">Reset All Statistics (Wipe Everything)</a>
</div>

<script>
    const MAX_SLOTS = 15;
    let players = [];

    // Load Data
    function load() {
        const raw = localStorage.getItem('tt_elite_data');
        if (raw) {
            players = JSON.parse(raw);
            // Auto-expand to 15 if user had 10 previously
            while(players.length < MAX_SLOTS) {
                players.push({ id: players.length, name: `Player ${players.length+1}`, actualGames: 0, logicGames: 0, wins: 0, isChecked: false, inLastMatch: false });
            }
        } else {
            players = Array.from({length: MAX_SLOTS}, (_, i) => ({
                id: i, name: `Player ${i+1}`, actualGames: 0, logicGames: 0, wins: 0, isChecked: false, inLastMatch: false
            }));
        }
    }

    let currentMatch = null;

    function renderInputs() {
        const container = document.getElementById('playerInputs');
        container.innerHTML = '';
        players.forEach((p, i) => {
            const div = document.createElement('div');
            div.className = 'player-row';
            div.innerHTML = `
                <input type="checkbox" ${p.isChecked ? 'checked' : ''} onchange="togglePlayer(${i})">
                <input type="text" value="${p.name}" onchange="updateName(${i}, this.value)" placeholder="Name">
                <span class="badge">L:${p.logicGames}</span>
            `;
            container.appendChild(div);
        });
    }

    function togglePlayer(idx) {
        const p = players[idx];
        p.isChecked = !p.isChecked;
        if (p.isChecked && p.logicGames === 0) {
            const othersActive = players.filter(pl => pl.id !== p.id && pl.isChecked && pl.actualGames > 0);
            if (othersActive.length > 0) {
                p.logicGames = Math.min(...othersActive.map(pl => pl.logicGames));
            } else {
                const anyPlayed = players.filter(pl => pl.id !== p.id && pl.actualGames > 0);
                if (anyPlayed.length > 0) p.logicGames = Math.min(...anyPlayed.map(pl => pl.logicGames));
            }
        } else if (!p.isChecked) {
            p.logicGames = 0;
        }
        save();
        renderInputs();
        updateLeaderboard();
    }

    function updateName(idx, val) {
        players[idx].name = val.trim() || `Player ${idx + 1}`; 
        save(); 
    }

    // Wilson Score Lower Bound Calculation
    function getWilsonScore(wins, total) {
        if (total === 0) return 0;
        const z = 1.96; // 95% confidence
        const phat = wins / total;
        const score = (phat + (z * z) / (2 * total) - z * Math.sqrt((phat * (1 - phat) + (z * z) / (4 * total)) / total)) / (1 + (z * z) / total);
        
        return score * 100; // Multiply by 100 at the very end
    }

    function generateNextMatch() {
        const available = players.filter(p => p.isChecked);
        if (available.length < 4) return alert("Need at least 4 checked players!");

        available.sort((a, b) => {
            const baseA = a.logicGames + (a.inLastMatch ? 0.5 : 0);
            const baseB = b.logicGames + (b.inLastMatch ? 0.5 : 0);
            return baseA !== baseB ? baseA - baseB : Math.random() - 0.5;
        });

        const selected = available.slice(0, 4);
        const getRate = (p) => p.actualGames === 0 ? 50 : (p.wins / p.actualGames) * 100;
        selected.sort((a, b) => getRate(b) - getRate(a));

        currentMatch = { teamA: [selected[0], selected[3]], teamB: [selected[1], selected[2]] };

        document.getElementById('teamA').innerHTML = `<div class="player-name">${currentMatch.teamA[0].name}</div><div class="ampersand">&</div><div class="player-name">${currentMatch.teamA[1].name}</div>`;
        document.getElementById('teamB').innerHTML = `<div class="player-name">${currentMatch.teamB[0].name}</div><div class="ampersand">&</div><div class="player-name">${currentMatch.teamB[1].name}</div>`;
        document.getElementById('currentMatchArea').style.display = 'block';
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function recordWin(winner) {
        const involvedIds = [...currentMatch.teamA, ...currentMatch.teamB].map(p => p.id);
        const winningIds = (winner === 'A' ? currentMatch.teamA : currentMatch.teamB).map(p => p.id);
        players.forEach(p => {
            if (involvedIds.includes(p.id)) {
                p.actualGames++; p.logicGames++; p.inLastMatch = true;
                if (winningIds.includes(p.id)) p.wins++;
            } else { p.inLastMatch = false; }
        });
        document.getElementById('currentMatchArea').style.display = 'none';
        save(); renderInputs(); updateLeaderboard();
    }

    function updateLeaderboard() {
        const tbody = document.querySelector('#leaderboard tbody');
        const sorted = [...players].filter(p => p.actualGames > 0 || p.isChecked).sort((a, b) => {
            const scoreA = getWilsonScore(a.wins, a.actualGames);
            const scoreB = getWilsonScore(b.wins, b.actualGames);
            return scoreB - scoreA || b.actualGames - a.actualGames;
        });
        
        tbody.innerHTML = sorted.map(p => {
            const rate = p.actualGames ? Math.round((p.wins / p.actualGames) * 100) : 0;
            const wilson = getWilsonScore(p.wins, p.actualGames).toFixed(1);
            return `<tr><td>${p.name}</td><td>${p.actualGames}</td><td>${p.wins}</td><td>${rate}%</td><td>${wilson}</td></tr>`;
        }).join('');
    }

    function save() { localStorage.setItem('tt_elite_data', JSON.stringify(players)); }

    function exportData() {
        const dataStr = JSON.stringify(players, null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `tt_mixer_backup_${new Date().toISOString().slice(0,10)}.json`;
        link.click();
    }

    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const imported = JSON.parse(e.target.result);
                if (Array.isArray(imported)) {
                    players = imported;
                    save();
                    location.reload();
                }
            } catch (err) { alert("Invalid file format."); }
        };
        reader.readAsText(file);
    }
    function resetData() {
        if(confirm("Wipe all statistics and start fresh?")) {
            localStorage.removeItem('tt_elite_data');
            location.reload();
        }
    }

    // Resets only the logicGames (L: badges) - Useful for a new night of play
    function resetSession() {
        if (confirm("Reset 'Logic Games' for all players? This keeps Leaderboard stats but restarts tonight's rotation priority.")) {
            players.forEach(p => {
                p.logicGames = 0;
                p.inLastMatch = false;
            });
            save();
            renderInputs();
            alert("Session reset! Everyone is now at L:0.");
        }
    }

    // Resets Wins/Games but keeps Names - Useful for starting a new 'Season'
    function resetLeaderboard() {
        if (confirm("Wipe all Win/Loss statistics? Player names will be kept, but the Leaderboard will be cleared.")) {
            players.forEach(p => {
                p.actualGames = 0;
                p.wins = 0;
                p.logicGames = 0;
                p.inLastMatch = false;
            });
            save();
            renderInputs();
            updateLeaderboard();
            alert("Leaderboard wiped! Ready for a new season.");
        }
    }
    load();
    renderInputs();
    updateLeaderboard();
</script>
</body>
</html>
