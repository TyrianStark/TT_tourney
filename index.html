<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TT Mixer Elite Dual</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="mode-switch">
        <button id="btnV2" class="mode-btn active" onclick="setMode('v2')">2 vs 2</button>
        <button id="btnV1" class="mode-btn" onclick="setMode('v1')">1 vs 1</button>
    </div>

    <div class="card">
        <h2>1. Players & Availability</h2>
        <div id="playerInputs"></div>
    </div>

    <button onclick="addPlayer()" style="background: #1e293b; border: 1px dashed var(--primary); margin-bottom: 15px; font-size: 0.8rem; padding: 10px;">
        + Add Player
    </button>

    <button onclick="generateNextMatch()">Generate Next Match</button>

    <div id="currentMatchArea" class="card" style="display:none; border: 2px solid var(--primary);">
        <h2 id="matchTitle">Current Match</h2>
        
        <div class="match-grid" style="margin-bottom: 20px;">
            <div class="team-col">
                <div id="teamA"></div>
                <div class="score-box">
                    <label>Score</label>
                    <div style="position: relative; display: inline-block;">
                        <input type="number" id="scoreA" value="0" min="0">
                        <button class="quick-score-btn" onclick="setQuickScore('A')">11</button>
                    </div>
                </div>
            </div>

            <div class="vs-circle">VS</div>

            <div class="team-col">
                <div id="teamB"></div>
                <div class="score-box">
                    <label>Score</label>
                    <div style="position: relative; display: inline-block;">
                        <input type="number" id="scoreB" value="0" min="0">
                        <button class="quick-score-btn" onclick="setQuickScore('B')">11</button>
                    </div>
                </div>
            </div>
        </div>
        <button class="submit-btn" onclick="finishMatch()">Submit Result</button>
        <button id="shuffleBtn" onclick="shufflePairs()" class="shuffle-btn">🔀 Shuffle Pairs</button>
    </div>

    <div class="card">
        <div class="tabs">
            <button class="tab-btn active" onclick="openTab('indiv')">Leaderboard</button>
            <button class="tab-btn" id="pairsTabBtn" onclick="openTab('pairs')">Pairs (2v2)</button>
            <button class="tab-btn" onclick="openTab('history')">History</button>
        </div>

        <!-- Tab 1: Individual Leaderboard -->
        <div id="tab-indiv" class="tab-content active">
            <h2 id="leaderboardTitle">Leaderboard</h2>
            <table id="leaderboard">
                <thead>
                    <tr><th>Player</th><th>P</th><th>W</th><th>W%</th><th>Wilson</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- Tab 2: Pairs Leaderboard -->
        <div id="tab-pairs" class="tab-content">
            <h2>2v2 Pairs Leaderboard</h2>
        <table id="pairsLeaderboard">
            <thead>
                <tr>
                    <th>Pair</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>        
        </div>

        <!-- Tab 3: History -->
        <div id="tab-history" class="tab-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h2 style="margin:0;">History</h2>
                <select id="historyFilter" onchange="renderHistory()" style="background:#1e293b; color:white; border:1px solid var(--border); border-radius:4px;">
                    <option value="all">All Players</option>
                </select>
            </div>
            <div id="historyList"></div>
        </div>
    </div>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px;">
        <button onclick="resetSession()" style="background: #475569; font-size: 0.8rem; padding: 10px;">Reset Session (L:0)</button>
        <button onclick="resetLeaderboard()" style="background: #475569; font-size: 0.8rem; padding: 10px;">Clear Current Leaderboard</button>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;">
        <button onclick="exportData()" style="background: #1e293b; border: 1px solid var(--border); font-size: 0.8rem; padding: 10px;">📤 Export Data</button>
        <button onclick="document.getElementById('importFile').click()" style="background: #1e293b; border: 1px solid var(--border); font-size: 0.8rem; padding: 10px;">📥 Import Data</button>
        <input type="file" id="importFile" style="display:none" accept=".json" onchange="importData(event)">
    </div>

    <a href="javascript:void(0)" class="reset-link" onclick="resetData()">Reset All Statistics (Wipe Everything)</a>
</div>
    <!--<script src="script.js"></script> -->
    <script src="data.js"></script>
    <script src="ui.js"></script>

</body>
</html>
