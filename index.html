<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TT Mixer Elite</title>
    <style>
        :root { 
            --bg: #0f172a; 
            --card: #1e293b; 
            --primary: #3b82f6; 
            --text: #f1f5f9; 
            --accent: #ef4444; 
            --success: #10b981;
            --border: #334155;
        }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; line-height: 1.5; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: var(--card); padding: 16px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3); margin-bottom: 20px; }
        h2 { margin-top: 0; font-size: 1.1rem; color: var(--primary); text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 15px; }
        
        .player-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        input[type="text"] { flex-grow: 1; padding: 10px; background: #0f172a; border: 1px solid var(--border); border-radius: 8px; color: white; font-size: 0.9rem; }
        input[type="checkbox"] { transform: scale(1.3); }
        
        button { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; font-size: 1rem; transition: filter 0.2s; }
        button:active { filter: brightness(0.8); }
        
        /* Split Match View */
        .match-grid { display: grid; grid-template-columns: 1fr 40px 1fr; align-items: start; gap: 10px; margin-bottom: 15px; }
        .team-col { display: flex; flex-direction: column; align-items: center; text-align: center; }
        .player-name { font-weight: 600; font-size: 1rem; margin: 4px 0; }
        .ampersand { color: #64748b; font-size: 0.8rem; }
        .vs-circle { background: var(--accent); width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.7rem; margin-top: 25px; }
        .win-btn { background: var(--success); padding: 10px; font-size: 0.85rem; margin-top: 10px; }

        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { text-align: left; color: #94a3b8; font-weight: 500; padding: 8px; }
        td { padding: 10px 8px; border-top: 1px solid var(--border); }
        .badge { background: #334155; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; color: #94a3b8; }
        .reset-link { color: #64748b; text-align: center; display: block; margin-top: 20px; font-size: 0.8rem; text-decoration: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>1. Players & Availability</h2>
        <div id="playerInputs"></div>
    </div>

    <button onclick="generateNextMatch()">Generate Next Match</button>

    <div id="currentMatchArea" class="card" style="display:none; border: 2px solid var(--primary);">
        <h2>Current Match</h2>
        <div class="match-grid">
            <div class="team-col" id="teamA"></div>
            <div class="vs-circle">VS</div>
            <div class="team-col" id="teamB"></div>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 40px 1fr; gap: 10px;">
            <button class="win-btn" onclick="recordWin('A')">Team A Won</button>
            <div></div>
            <button class="win-btn" onclick="recordWin('B')">Team B Won</button>
        </div>
    </div>

    <div class="card">
        <h2>Leaderboard</h2>
        <table id="leaderboard">
            <thead>
                <tr><th>Player</th><th>P</th><th>W</th><th>Win %</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    
    <a href="#" class="reset-link" onclick="resetData()">Reset All Statistics</a>
</div>

<script>
    const MAX_SLOTS = 15;
    let players = [];

    // Load Data
    function load() {
        const raw = localStorage.getItem('tt_elite_data');
        if (raw) {
            players = JSON.parse(raw);
            // Auto-expand to 15 if user had 10 previously
            while(players.length < MAX_SLOTS) {
                players.push({ id: players.length, name: `Player ${players.length+1}`, actualGames: 0, logicGames: 0, wins: 0, isChecked: false, inLastMatch: false });
            }
        } else {
            players = Array.from({length: MAX_SLOTS}, (_, i) => ({
                id: i, name: `Player ${i+1}`, actualGames: 0, logicGames: 0, wins: 0, isChecked: false, inLastMatch: false
            }));
        }
    }

    let currentMatch = null;

    function renderInputs() {
        const container = document.getElementById('playerInputs');
        container.innerHTML = '';
        players.forEach((p, i) => {
            const div = document.createElement('div');
            div.className = 'player-row';
            div.innerHTML = `
                <input type="checkbox" ${p.isChecked ? 'checked' : ''} onchange="togglePlayer(${i})">
                <input type="text" value="${p.name}" oninput="updateName(${i}, this.value)" placeholder="Name">
                <span class="badge">L:${p.logicGames}</span>
            `;
            container.appendChild(div);
        });
    }

    function togglePlayer(idx) {
        players[idx].isChecked = !players[idx].isChecked;
        if (players[idx].isChecked && players[idx].actualGames === 0) {
            const played = players.filter(p => p.actualGames > 0);
            if (played.length > 0) players[idx].logicGames = Math.min(...played.map(p => p.logicGames));
        }
        save();
        updateLeaderboard();
    }

    function updateName(idx, val) { players[idx].name = val; save(); }

    function generateNextMatch() {
        const available = players.filter(p => p.isChecked);
        if (available.length < 4) return alert("Need at least 4 checked players!");

        // 1. Sort with Randomness for Tiers
        // We add a tiny random decimal to logicGames to break ties randomly
        available.sort((a, b) => {
            const scoreA = a.logicGames + (a.inLastMatch ? 0.5 : 0) + Math.random() * 0.1;
            const scoreB = b.logicGames + (b.inLastMatch ? 0.5 : 0) + Math.random() * 0.1;
            return scoreA - scoreB;
        });

        const selected = available.slice(0, 4);

        // 2. Seeding by Win % (using 50% for new players)
        const getRate = (p) => p.actualGames === 0 ? 50 : (p.wins / p.actualGames) * 100;
        selected.sort((a, b) => getRate(b) - getRate(a));

        currentMatch = {
            teamA: [selected[0], selected[3]],
            teamB: [selected[1], selected[2]]
        };

        // Render UI Split View
        document.getElementById('teamA').innerHTML = `<div class="player-name">${currentMatch.teamA[0].name}</div><div class="ampersand">&</div><div class="player-name">${currentMatch.teamA[1].name}</div>`;
        document.getElementById('teamB').innerHTML = `<div class="player-name">${currentMatch.teamB[0].name}</div><div class="ampersand">&</div><div class="player-name">${currentMatch.teamB[1].name}</div>`;
        
        document.getElementById('currentMatchArea').style.display = 'block';
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function recordWin(winner) {
        const involvedIds = [...currentMatch.teamA, ...currentMatch.teamB].map(p => p.id);
        const winningIds = (winner === 'A' ? currentMatch.teamA : currentMatch.teamB).map(p => p.id);

        players.forEach(p => {
            if (involvedIds.includes(p.id)) {
                p.actualGames++;
                p.logicGames++;
                p.inLastMatch = true;
                if (winningIds.includes(p.id)) p.wins++;
            } else {
                p.inLastMatch = false;
            }
        });

        document.getElementById('currentMatchArea').style.display = 'none';
        save();
        renderInputs();
        updateLeaderboard();
    }

    function updateLeaderboard() {
        const tbody = document.querySelector('#leaderboard tbody');
        tbody.innerHTML = '';
        const sorted = [...players].filter(p => p.actualGames > 0 || p.isChecked).sort((a, b) => {
            const rateA = a.actualGames ? a.wins / a.actualGames : -1;
            const rateB = b.actualGames ? b.wins / b.actualGames : -1;
            return rateB - rateA || b.actualGames - a.actualGames;
        });
        
        sorted.forEach(p => {
            const rate = p.actualGames ? Math.round((p.wins / p.actualGames) * 100) : 0;
            tbody.innerHTML += `<tr><td>${p.name}</td><td>${p.actualGames}</td><td>${p.wins}</td><td>${rate}%</td></tr>`;
        });
    }

    function save() { localStorage.setItem('tt_elite_data', JSON.stringify(players)); }
    
    function resetData() {
        if(confirm("Wipe all statistics and start fresh?")) {
            localStorage.removeItem('tt_elite_data');
            location.reload();
        }
    }

    load();
    renderInputs();
    updateLeaderboard();
</script>
</body>
</html>
